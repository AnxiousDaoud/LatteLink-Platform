name: Work note
description: Optional lightweight template for tracking work in GitHub
title: ""
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the work, bug, or follow-up item.
      placeholder: Describe the work in a sentence or two.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add any background, links, screenshots, or notes that help explain the task.
      placeholder: Add relevant context.
    validations:
      required: false
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Describe how you expect this work to be checked or verified.
      placeholder: |
        Local checks:
        - lint
        - test

        Live checks:
        - smoke test
    validations:
      required: false
