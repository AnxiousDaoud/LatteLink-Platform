name: Incident
about: Production or staging incident record
labels: [incident]
body:
  - type: input
    id: severity
    attributes:
      label: Severity
      placeholder: SEV-1 / SEV-2 / SEV-3
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: User/Business Impact
    validations:
      required: true
  - type: textarea
    id: timeline
    attributes:
      label: Timeline
      placeholder: Include timestamps in UTC
    validations:
      required: true
  - type: textarea
    id: mitigation
    attributes:
      label: Mitigation and Follow-up
    validations:
      required: true
