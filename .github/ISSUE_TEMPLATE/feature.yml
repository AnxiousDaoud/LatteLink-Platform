name: Feature
about: New capability or enhancement
labels: [feature]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: What needs to be built?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: Define done conditions
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks
      placeholder: What could break?
